<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirmwareCloud — ROM Cloud for oplus!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-color: #eb0029;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --input-bg: #1f2937;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1f2937;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .auth-buttons button {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .auth-buttons button:hover {
            border-color: var(--text-main);
        }

        .main-container {
            max-width: 1200px;
            margin: 60px auto;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .main-title span {
            color: var(--accent-color);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        .search-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background-color: var(--card-bg);
            border: 1px solid #1f2937;
            border-radius: 30px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .device-card {
            background-color: var(--card-bg);
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .device-card:hover {
            transform: translateY(-2px);
            border-color: #374151;
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .device-icon-box {
            background-color: #1f2937;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-muted);
        }

        .device-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .device-count {
            font-size: 12px;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .arrow-icon {
            color: var(--text-muted);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid #1f2937;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-sizing: border-box;
            position: relative;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #374151;
            border-radius: 6px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .error-message {
            color: var(--accent-color);
            font-size: 14px;
            margin-bottom: 15px;
            text-align: left;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #1f2937;
        }

        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #374151;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .google-btn:hover {
            background-color: #1f2937;
        }

        .switch-auth-mode {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-auth-mode a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Firmware<span>Cloud</span></div>
        <div class="auth-buttons">
            <button id="openAuthBtn">Войти</button>
        </div>
    </header>

    <div class="main-container">
        <h1 class="main-title">Выберите устройство <span>OnePlus</span></h1>
        <p class="subtitle">Интерактивный доступ к архивам OxygenOS. Выберите модель ниже для просмотра доступных пакетов прошивок.</p>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск смартфона (например, OnePlus 12)...">
        </div>

        <div class="devices-grid" id="devicesGrid">
            <p style="color: var(--text-muted)">Загрузка списка устройств...</p>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <h2 id="modalTitle" style="margin-top: 0; margin-bottom: 24px; text-align: left;">Войти</h2>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="user@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="error-message" id="authError">
                    <i class="fa-solid fa-circle-xmark"></i> <span id="errorText">Ошибка</span>
                </div>

                <button type="submit" class="submit-btn" id="submitFormBtn">ВОЙТИ</button>
            </form>

            <div class="divider">или</div>

            <button class="google-btn" id="googleLoginBtn">
                <i class="fa-brands fa-google"></i> Продолжить с Google
            </button>

            <div class="switch-auth-mode" id="switchAuthBlock">
                Нет аккаунта? <a href="#" id="toggleAuthModeLink">Создать аккаунт</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ТВОИ РЕАЛЬНЫЕ ДАННЫЕ ИЗ КОНСОЛИ ФАЕРБЕЙС
        const firebaseConfig = {
            apiKey: "ВСТАВЬ_СЮДА_СВОЙ_API_KEY_ИЗ_НАСТРОЕК", 
            authDomain: "fwcloud-70490.firebaseapp.com",
            projectId: "fwcloud-70490",
            storageBucket: "fwcloud-70490.appspot.com",
            messagingSenderId: "562358328378",
            appId: "1:562358328378:web:757451631be8bf49911e3b" // Вставь свой полный appId если он другой
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        provider.setCustomParameters({
            prompt: 'select_account'
        });

        let isSignUpMode = false;
        let devicesData = [];

        const authModal = document.getElementById('authModal');
        const openAuthBtn = document.getElementById('openAuthBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const authForm = document.getElementById('authForm');
        const modalTitle = document.getElementById('modalTitle');
        const submitFormBtn = document.getElementById('submitFormBtn');
        const toggleAuthModeLink = document.getElementById('toggleAuthModeLink');
        const switchAuthBlock = document.getElementById('switchAuthBlock');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const authError = document.getElementById('authError');
        const errorText = document.getElementById('errorText');
        const devicesGrid = document.getElementById('devicesGrid');
        const searchInput = document.getElementById('searchInput');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                openAuthBtn.innerText = "Выйти (" + (user.displayName || user.email.split('@')[0]) + ")";
                openAuthBtn.onclick = () => {
                    signOut(auth).then(() => { window.location.reload(); });
                };
            } else {
                openAuthBtn.innerText = "Войти";
                openAuthBtn.onclick = () => { openModal(); };
            }
        });

        function openModal() {
            authModal.style.display = 'flex';
            hideError();
        }
        function closeModal() {
            authModal.style.display = 'none';
            authForm.reset();
        }
        closeModalBtn.onclick = closeModal;
        window.onclick = (e) => { if (e.target === authModal) closeModal(); };

        toggleAuthModeLink.onclick = (e) => {
            e.preventDefault();
            isSignUpMode = !isSignUpMode;
            hideError();
            if (isSignUpMode) {
                modalTitle.innerText = "Регистрация";
                submitFormBtn.innerText = "СОЗДАТЬ АККАУНТ";
                switchAuthBlock.innerHTML = 'Уже есть аккаунт? <a href="#" id="toggleAuthModeLink">Войти</a>';
            } else {
                modalTitle.innerText = "Войти";
                submitFormBtn.innerText = "ВОЙТИ";
                switchAuthBlock.innerHTML = 'Нет аккаунта? <a href="#" id="toggleAuthModeLink">Создать аккаунт</a>';
            }
            document.getElementById('toggleAuthModeLink').onclick = toggleAuthModeLink.onclick;
        };

        function showError(msg) {
            errorText.innerText = msg;
            authError.style.display = 'flex';
        }
        function hideError() {
            authError.style.display = 'none';
        }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            hideError();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isSignUpMode) {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                closeModal();
            } catch (error) {
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    showError("Неверный email или пароль.");
                } else if (error.code === 'auth/weak-password') {
                    showError("Пароль должен быть не менее 6 символов.");
                } else if (error.code === 'auth/email-already-in-use') {
                    showError("Этот email уже занят.");
                } else {
                    showError(error.message);
                }
            }
        };

        // Вход через Google (Popup)
        googleLoginBtn.onclick = async (e) => {
            e.preventDefault();
            hideError();
            try {
                await signInWithPopup(auth, provider);
                closeModal();
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user') {
                    showError("Окно входа закрыто пользователем.");
                } else {
                    showError("Ошибка сети или домен не авторизован в Firebase.");
                }
            }
        };

        // Загрузка локального JSON
        async function loadDevices() {
            try {
                const response = await fetch('firmwares.json');
                if (!response.ok) throw new Error();
                devicesData = await response.json();
                renderDevices(devicesData);
            } catch (error) {
                devicesGrid.innerHTML = `<p style="color: var(--accent-color)">Ошибка загрузки данных: Failed to fetch json</p>`;
            }
        }

        function renderDevices(list) {
            if (list.length === 0) {
                devicesGrid.innerHTML = `<p style="color: var(--text-muted)">Ничего не найдено</p>`;
                return;
            }
            devicesGrid.innerHTML = list.map(device => `
                <div class="device-card" onclick="alert('Выбрано устройство: ${device.name}')">
                    <div class="device-info">
                        <div class="device-icon-box">
                            <i class="fa-solid fa-mobile-screen-button"></i>
                        </div>
                        <div>
                            <div class="device-name">${device.name}</div>
                            <div class="device-count">● ${device.count || '1 СБОРКА'}</div>
                        </div>
                    </div>
                    <div class="arrow-icon">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </div>
                </div>
            `).join('');
        }

        searchInput.oninput = (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = devicesData.filter(d => d.name.toLowerCase().includes(query));
            renderDevices(filtered);
        };

        loadDevices();
    </script>
</body>
</html>
